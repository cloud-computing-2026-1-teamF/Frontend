name: Frontend CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
  AMPLIFY_APP_NAME: ${{ vars.AMPLIFY_APP_NAME || 'sanggwonai-dev-frontend' }}
  AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:8080/v1' }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY || 'ci-placeholder' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy with Amplify
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Amplify app
        id: amplify
        run: |
          set -euo pipefail

          if [ -n "${AMPLIFY_APP_ID}" ]; then
            app_id="${AMPLIFY_APP_ID}"
          else
            app_id="$(aws amplify list-apps \
              --query "apps[?name=='${AMPLIFY_APP_NAME}'].appId | [0]" \
              --output text)"
          fi

          if [ -z "${app_id}" ] || [ "${app_id}" = "None" ]; then
            echo "::error::Amplify app '${AMPLIFY_APP_NAME}' was not found. Set AMPLIFY_APP_ID or apply the Terraform Amplify resources first."
            exit 1
          fi

          echo "app-id=${app_id}" >> "${GITHUB_OUTPUT}"

      - name: Start Amplify release job
        run: |
          aws amplify start-job \
            --app-id "${{ steps.amplify.outputs.app-id }}" \
            --branch-name "${AMPLIFY_BRANCH}" \
            --job-type RELEASE
